  <!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Дневник - Софтуерно инженерство</title>
 
<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
}
 

header{
  background:#1e88e5;
  color:white;
  padding:15px 30px;
  font-size:20px;
}
 

.top-menu{
  background:white;
  padding:15px;
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  box-shadow:0 2px 5px #ccc;
}
.menu-btn{
  border:1px solid #ccc;
  padding:10px 18px;
  border-radius:6px;
  background:#f7f7f7;
  cursor:pointer;
}
.menu-btn.active{
  background:#1e88e5;
  color:white;
  border:none;
}
 

.container{padding:20px;}
table{
  width:100%;
  border-collapse:collapse;
  background:white;
}
th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}
th{
  background:#607d8b;
  color:white;
}
tr:nth-child(even){background:#f9f9f9;}
 

.plus-btn{
  background:#00c853;
  color:white;
  border:none;
  width:32px;
  height:32px;
  border-radius:50%;
  font-size:20px;
  cursor:pointer;
}

.absence-btn{
  background:#e3f2fd;
  color:#1e88e5;
  border:2px solid #1e88e5;
  padding:10px 15px;
  margin:5px;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}
.absence-btn.selected{
  background:#1e88e5;
  color:white;
}

.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}
.modal-content{
  background:white;
  padding:25px;
  border-radius:8px;
  width:350px;
  text-align:center;
}
 

 
select,input{
  width:90%;
  padding:8px;
  margin-top:10px;
}
 
.modal-content button{
  margin-top:15px;
  padding:8px 15px;
  border:none;
  background:#1e88e5;
  color:white;
  cursor:pointer;
}

.calendar-container {
  display: flex;
  gap: 20px;
  height: calc(100vh - 140px);
}

.calendar-section {
  flex: 1;
  background: white;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  max-width: 50%;
}

.details-section {
  flex: 1;
  background: white;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  max-width: 50%;
}

.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 2px solid #1e88e5;
}

.calendar-header h2 {
  margin: 0;
  color: #1e88e5;
  font-size: 24px;
  font-weight: 600;
}

.nav-btn {
  background: #1e88e5;
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  transition: background 0.3s;
}

.nav-btn:hover {
  background: #1565c0;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
  gap: 12px;
  padding: 10px 0;
}

.calendar-day {
  min-height: 50px;
  min-width: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  font-weight: 600;
  transition: all 0.3s;
  position: relative;
  padding: 12px;
}

.calendar-day:hover {
  background: #e3f2fd;
  transform: scale(1.05);
}

.calendar-day.today {
  background: #1e88e5;
  color: white;
}

.calendar-day.selected {
  background: #ff9800;
  color: white;
}

.details-header {
  border-bottom: 2px solid #1e88e5;
  padding-bottom: 15px;
  margin-bottom: 20px;
}

.details-header h3 {
  margin: 0;
  color: #1e88e5;
  font-size: 20px;
}

.details-content {
  padding: 20px 0;
}

.no-selection {
  text-align: center;
  color: #999;
  font-style: italic;
  padding: 40px 20px;
}

.plan-textarea {
  width: 100%;
  height: 200px;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 6px;
  resize: vertical;
}

.save-btn {
  background: #4caf50;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  margin-top: 10px;
}

.save-btn:hover {
  background: #45a049;
}
</style>
</head>
 
<body>
 
<header>Дневник 12А – Софтуерно инженерство</header>
 

<div class="top-menu">
  <button class="menu-btn" onclick="location.href='Teacher.html'">Оценки</button>
  <div class="menu-btn" onclick="location.href='Teacher-absense.html'">Отсъствия</div>
  <div class="menu-btn" onclick="location.href='teacher zabelejki-pohvali.html'">Забележки / Похвали</div>
  <div class="menu-btn active" onclick="location.href='Teacher-calendar.html'">Събития</div>
</div>
 

<div class="container">
<div class="calendar-container">
  <div class="calendar-section">
    <div class="calendar-header">
      <button class="nav-btn" id="prevMonth">&lt;</button>
      <h2 id="monthYear">Април 2026</h2>
      <button class="nav-btn" id="nextMonth">&gt;</button>
    </div>
    
    <div class="calendar-grid" id="calendarGrid">
    
    </div>
  </div>

  <div class="details-section">
    <div class="details-header">
      <h3 id="selectedDate">Изберете дата</h3>
    </div>
    <div class="details-content" id="detailsContent">
      <div class="no-selection">
        Кликнете върху дата в календара, за да въведете план за този ден.
      </div>
    </div>
  </div>
</div>
</div>
 
<script>
class Calendar {
  constructor() {
    this.currentDate = new Date();
    this.selectedDate = null;
    this.plans = {}; 
    this.init();
  }

  init() {
    this.renderCalendar();
    this.bindEvents();
  }

  bindEvents() {
    document.getElementById('prevMonth').addEventListener('click', () => {
      this.currentDate.setMonth(this.currentDate.getMonth() - 1);
      this.renderCalendar();
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
      this.currentDate.setMonth(this.currentDate.getMonth() + 1);
      this.renderCalendar();
    });
  }

  renderCalendar() {
    const monthYear = document.getElementById('monthYear');
    const calendarGrid = document.getElementById('calendarGrid');

    
    const monthNames = ['Януари', 'Февруари', 'Март', 'Април', 'Май', 'Юни', 
                       'Юли', 'Август', 'Септември', 'Октомври', 'Ноември', 'Декември'];
    monthYear.textContent = `${monthNames[this.currentDate.getMonth()]} ${this.currentDate.getFullYear()}`;

    
    const existingDays = calendarGrid.querySelectorAll('.calendar-day');
    existingDays.forEach(day => day.remove());

    
    const firstDay = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth(), 1);
    const lastDay = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth() + 1, 0);
    
    
    for (let day = 1; day <= lastDay.getDate(); day++) {
      const dayElement = document.createElement('div');
      const currentDay = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth(), day);

      dayElement.className = 'calendar-day';
      dayElement.textContent = day;

      
      const today = new Date();
      if (currentDay.toDateString() === today.toDateString()) {
        dayElement.classList.add('today');
      }

      
      if (this.selectedDate && currentDay.toDateString() === this.selectedDate.toDateString()) {
        dayElement.classList.add('selected');
      }

      
      dayElement.addEventListener('click', () => this.selectDate(currentDay));

      calendarGrid.appendChild(dayElement);
    }
  }

  selectDate(date) {
    this.selectedDate = date;
    this.renderCalendar();
    this.showDetails(date);
  }

  showDetails(date) {
    const selectedDateElement = document.getElementById('selectedDate');
    const detailsContent = document.getElementById('detailsContent');

    const dayNames = ['Неделя', 'Понеделник', 'Вторник', 'Сряда', 'Четвъртък', 'Петък', 'Събота'];
    const monthNames = ['Януари', 'Февруари', 'Март', 'Април', 'Май', 'Юни', 
                       'Юли', 'Август', 'Септември', 'Октомври', 'Ноември', 'Декември'];

    selectedDateElement.textContent = `${dayNames[date.getDay()]}, ${date.getDate()} ${monthNames[date.getMonth()]} ${date.getFullYear()}`;

    const dateKey = date.toDateString();
    const existingPlan = this.plans[dateKey] || '';

    
    detailsContent.innerHTML = `
      <label for="planTextarea">План за деня:</label>
      <textarea class="plan-textarea" id="planTextarea" placeholder="Въведете план за този ден...">${existingPlan}</textarea>
      <button class="save-btn" onclick="calendar.savePlan()">Запиши</button>
    `;
  }

  savePlan() {
    if (!this.selectedDate) return;
    const dateKey = this.selectedDate.toDateString();
    const planText = document.getElementById('planTextarea').value;
    this.plans[dateKey] = planText;
    alert('Планът е записан успешно!');
  }
}

let calendar;
document.addEventListener('DOMContentLoaded', () => {
  calendar = new Calendar();
});
</script>
 
</body>
</html>
